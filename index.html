<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ramya Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    .card {
      background: white;
      color: #333;
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #764ba2;
    }

    .skills span {
      display: inline-block;
      background: #eee;
      color: #333;
      padding: 5px 10px;
      border-radius: 10px;
      margin: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <img src="https://via.placeholder.com/120" alt="profile">

      <h1>Hi, I'm Ramya 👋</h1>
      <h3>Web Development Intern</h3>

      <p>I am passionate about learning web development and building beautiful websites.</p>

      <h3>💻 Skills</h3>
      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
      </div>

      <h3>📬 Contact</h3>
      <p>Email: your-email@gmail.com</p>

      <a href="#" class="btn">View My Work</a>

    </div>
  </div>
</body>
</html>
